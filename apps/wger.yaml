apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wger
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/JanikHenz/my-homelab.git"
    targetRevision: HEAD
    path: manifests/fitness/wger
  destination:
    name: homelab
    namespace: fitness
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
