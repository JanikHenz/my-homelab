apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/JanikHenz/my-homelab.git"
    targetRevision: HEAD
    path: apps
    directory:
      recurse: false
  destination:
    name: homelab
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
