apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wger
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/JanikHenz/my-homelab.git"
    targetRevision: HEAD
    path: applications/wger/manifests
  destination:
    name: homelab
    namespace: wger
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
