apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-dashboard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/JanikHenz/my-homelab
    targetRevision: HEAD
    path: manifests/media-stack/nginx-dashboard
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
