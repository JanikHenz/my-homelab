apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-nodes
  namespace: monitoring
data:
  nodes.json: |
    {
      "title": "Node Overview",
      "uid": "homelab-nodes",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "templating": {
        "list": [
          {
            "name": "node",
            "label": "Node",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(node_uname_info, nodename)",
            "refresh": 2,
            "multi": false,
            "includeAll": true,
            "allValue": ".*",
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "CPU Usage",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "thresholds": {
              "mode": "absolute",
              "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 60 },
                { "color": "red", "value": 85 }
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "decimals": 1
            }
          },
          "targets": [
            {
              "expr": "100 - (avg by(node) (rate(node_cpu_seconds_total{mode=\"idle\", node=~\"$node\"}[5m])) * 100)",
              "legendFormat": "{{node}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Memory Usage",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "thresholds": {
              "mode": "absolute",
              "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 70 },
                { "color": "red", "value": 90 }
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "decimals": 1
            }
          },
          "targets": [
            {
              "expr": "100 * (1 - ((node_memory_MemAvailable_bytes{node=~\"$node\"}) / (node_memory_MemTotal_bytes{node=~\"$node\"})))",
              "legendFormat": "{{node}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Disk Usage (/)",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "thresholds": {
              "mode": "absolute",
              "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 70 },
                { "color": "red", "value": 90 }
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "decimals": 1
            }
          },
          "targets": [
            {
              "expr": "100 - (node_filesystem_avail_bytes{node=~\"$node\", mountpoint=\"/\", fstype!=\"tmpfs\"} / node_filesystem_size_bytes{node=~\"$node\", mountpoint=\"/\", fstype!=\"tmpfs\"} * 100)",
              "legendFormat": "{{node}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Uptime",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 0
            }
          },
          "targets": [
            {
              "expr": "node_time_seconds{node=~\"$node\"} - node_boot_time_seconds{node=~\"$node\"}",
              "legendFormat": "{{node}}"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "CPU Usage per Node",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "expr": "100 - (avg by(node) (rate(node_cpu_seconds_total{mode=\"idle\", node=~\"$node\"}[5m])) * 100)",
              "legendFormat": "{{node}} CPU"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Memory Usage per Node",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "expr": "node_memory_MemTotal_bytes{node=~\"$node\"} - node_memory_MemAvailable_bytes{node=~\"$node\"}",
              "legendFormat": "{{node}} used"
            },
            {
              "expr": "node_memory_MemTotal_bytes{node=~\"$node\"}",
              "legendFormat": "{{node}} total"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Network Traffic",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "mean"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            }
          },
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{node=~\"$node\", device!~\"lo|veth.*|docker.*|cali.*|flannel.*|tunl.*\"}[5m])",
              "legendFormat": "{{node}} {{device}} rx"
            },
            {
              "expr": "rate(node_network_transmit_bytes_total{node=~\"$node\", device!~\"lo|veth.*|docker.*|cali.*|flannel.*|tunl.*\"}[5m])",
              "legendFormat": "{{node}} {{device}} tx"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "System Load Average",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            }
          },
          "targets": [
            {
              "expr": "node_load1{node=~\"$node\"}",
              "legendFormat": "{{node}} 1m"
            },
            {
              "expr": "node_load5{node=~\"$node\"}",
              "legendFormat": "{{node}} 5m"
            },
            {
              "expr": "node_load15{node=~\"$node\"}",
              "legendFormat": "{{node}} 15m"
            }
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Disk I/O",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "mean"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            }
          },
          "targets": [
            {
              "expr": "rate(node_disk_read_bytes_total{node=~\"$node\", device!~\"loop.*\"}[5m])",
              "legendFormat": "{{node}} {{device}} read"
            },
            {
              "expr": "rate(node_disk_written_bytes_total{node=~\"$node\", device!~\"loop.*\"}[5m])",
              "legendFormat": "{{node}} {{device}} write"
            }
          ]
        },
        {
          "id": 10,
          "type": "table",
          "title": "Node Info",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "options": {
            "footer": { "show": false }
          },
          "transformations": [
            { "id": "merge", "options": {} },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true, "__name__": true, "job": true, "instance": true },
                "renameByName": {
                  "nodename": "Node",
                  "sysname": "OS",
                  "release": "Kernel",
                  "machine": "Arch"
                }
              }
            }
          ],
          "targets": [
            {
              "expr": "node_uname_info{node=~\"$node\"}",
              "legendFormat": "",
              "instant": true,
              "format": "table"
            }
          ]
        }
      ]
    }
